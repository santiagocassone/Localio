<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" role="img" aria-label="Clínica general veterinaria">
  <defs>
	<linearGradient id="cbg" x1="0%" y1="0%" x2="100%" y2="100%">
	  <stop offset="0%" stop-color="#e0f2ea"/>
	  <stop offset="100%" stop-color="#d0eaf8"/>
	</linearGradient>
  </defs>
  <rect width="240" height="180" fill="url(#cbg)" rx="12"/>

  <!-- Cruz médica veterinaria central -->
  <rect x="102" y="50" width="36" height="80" rx="8" fill="#1a8f5a" opacity="0.85"/>
  <rect x="82" y="70" width="76" height="36" rx="8" fill="#1a8f5a" opacity="0.85"/>

  <!-- Silueta perro sentado (sobrio, pequeño) -->
  <ellipse cx="60" cy="138" rx="22" ry="16" fill="#c8a87a" opacity="0.9"/>
  <circle cx="50" cy="118" r="14" fill="#c8a87a" opacity="0.9"/>
  <ellipse cx="44" cy="108" rx="6" ry="10" fill="#b89060" transform="rotate(-15 44 108)"/>
  <ellipse cx="58" cy="107" rx="6" ry="10" fill="#b89060" transform="rotate(10 58 107)"/>
  <circle cx="47" cy="116" r="3" fill="#3a2a1a"/>
  <circle cx="55" cy="116" r="3" fill="#3a2a1a"/>
  <ellipse cx="51" cy="122" rx="3" ry="2" fill="#8a5040"/>

  <!-- Silueta gato sentado (sobrio) -->
  <ellipse cx="186" cy="138" rx="20" ry="15" fill="#d0b898" opacity="0.9"/>
  <circle cx="196" cy="118" r="13" fill="#d0b898" opacity="0.9"/>
  <polygon points="188,108 192,95 198,108" fill="#b89870"/>
  <polygon points="196,108 200,95 206,108" fill="#b89870"/>
  <circle cx="193" cy="116" r="2.5" fill="#3a2a1a"/>
  <circle cx="200" cy="116" r="2.5" fill="#3a2a1a"/>
  <ellipse cx="196" cy="122" rx="2.5" ry="1.5" fill="#c07878"/>

  <!-- Jeringa decorativa (vacunas) -->
  <rect x="110" y="148" width="6" height="22" rx="2" fill="#4e8ba5" opacity="0.6"/>
  <rect x="107" y="158" width="12" height="8" rx="2" fill="#7ab0c8" opacity="0.5"/>
  <rect x="112" y="144" width="2" height="8" rx="1" fill="#4e8ba5" opacity="0.6"/>

  <text x="120" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#3a6a5a" opacity="0.5">imagen temporal</text>
</svg>
