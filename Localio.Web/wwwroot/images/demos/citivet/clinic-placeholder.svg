<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" role="img" aria-label="Consultorio Veterinaria Citivet — Julián Álvarez 211, Villa Crespo">
  <defs>
	<linearGradient id="clbg" x1="0%" y1="0%" x2="100%" y2="100%">
	  <stop offset="0%" stop-color="#daeef8"/>
	  <stop offset="100%" stop-color="#d4ece4"/>
	</linearGradient>
	<linearGradient id="clwall" x1="0%" y1="0%" x2="0%" y2="100%">
	  <stop offset="0%" stop-color="#f0f8f4"/>
	  <stop offset="100%" stop-color="#e2f0eb"/>
	</linearGradient>
  </defs>

  <rect width="400" height="220" fill="url(#clbg)" rx="0"/>

  <!-- Fachada del consultorio (estilizada) -->
  <!-- Pared principal -->
  <rect x="60" y="60" width="280" height="130" fill="url(#clwall)" rx="4"/>
  <!-- Techo -->
  <polygon points="40,64 200,20 360,64" fill="#b8d4c8"/>
  <!-- Línea techo inferior -->
  <rect x="40" y="60" width="320" height="8" rx="2" fill="#a0c0b0"/>

  <!-- Puerta -->
  <rect x="172" y="120" width="56" height="70" rx="4" fill="#d0e8e0"/>
  <rect x="172" y="120" width="56" height="70" rx="4" fill="none" stroke="#8ab8a8" stroke-width="1.5"/>
  <!-- Arco de puerta -->
  <path d="M172 120 Q200 96 228 120" fill="#b8d8cc" stroke="#8ab8a8" stroke-width="1.5"/>
  <!-- Manija -->
  <circle cx="220" cy="158" r="3" fill="#8ab8a8"/>
  <!-- Vidriera puerta -->
  <ellipse cx="200" cy="126" rx="16" ry="10" fill="#c8e8e0" opacity="0.6"/>

  <!-- Ventana izquierda -->
  <rect x="88" y="96" width="60" height="48" rx="4" fill="#c8e4f4" stroke="#8ab8c8" stroke-width="1.5"/>
  <line x1="118" y1="96" x2="118" y2="144" stroke="#8ab8c8" stroke-width="1"/>
  <line x1="88" y1="120" x2="148" y2="120" stroke="#8ab8c8" stroke-width="1"/>
  <!-- Maceta en ventana -->
  <rect x="100" y="136" width="16" height="10" rx="2" fill="#8a9a7a"/>
  <ellipse cx="108" cy="134" rx="10" ry="7" fill="#78af78"/>

  <!-- Ventana derecha -->
  <rect x="252" y="96" width="60" height="48" rx="4" fill="#c8e4f4" stroke="#8ab8c8" stroke-width="1.5"/>
  <line x1="282" y1="96" x2="282" y2="144" stroke="#8ab8c8" stroke-width="1"/>
  <line x1="252" y1="120" x2="312" y2="120" stroke="#8ab8c8" stroke-width="1"/>
  <!-- Maceta en ventana -->
  <rect x="264" y="136" width="16" height="10" rx="2" fill="#8a9a7a"/>
  <ellipse cx="272" cy="134" rx="10" ry="7" fill="#78af78"/>

  <!-- Cartel del consultorio -->
  <rect x="150" y="72" width="100" height="24" rx="4" fill="#1a8f5a" opacity="0.85"/>
  <text x="200" y="88" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#fff" font-weight="600" opacity="0.95">Citivet</text>

  <!-- Cruz médica en cartel -->
  <rect x="114" y="76" width="5" height="14" rx="1.5" fill="#1a8f5a" opacity="0.7"/>
  <rect x="109" y="81" width="14" height="5" rx="1.5" fill="#1a8f5a" opacity="0.7"/>

  <!-- Vereda -->
  <rect x="0" y="188" width="400" height="32" fill="#d0dce8"/>
  <rect x="60" y="186" width="280" height="6" rx="2" fill="#b8c8d4"/>

  <!-- Planta izquierda exterior -->
  <rect x="46" y="160" width="8" height="30" rx="3" fill="#6a9a72"/>
  <ellipse cx="50" cy="152" rx="16" ry="12" fill="#8abf88"/>
  <ellipse cx="37" cy="160" rx="12" ry="9" fill="#78af78" transform="rotate(-20 37 160)"/>

  <!-- Planta derecha exterior -->
  <rect x="346" y="160" width="8" height="30" rx="3" fill="#6a9a72"/>
  <ellipse cx="350" cy="152" rx="16" ry="12" fill="#8abf88"/>
  <ellipse cx="362" cy="160" rx="12" ry="9" fill="#78af78" transform="rotate(20 362 160)"/>

  <!-- Pata huella decorativa fondo -->
  <g opacity="0.08" transform="translate(348 28) scale(0.45)">
	<ellipse cx="0" cy="0" rx="22" ry="18" fill="#1a6a5a"/>
	<circle cx="28" cy="-22" r="12" fill="#1a6a5a"/>
	<circle cx="-28" cy="-22" r="12" fill="#1a6a5a"/>
	<circle cx="44" cy="4" r="10" fill="#1a6a5a"/>
	<circle cx="-44" cy="4" r="10" fill="#1a6a5a"/>
  </g>

  <text x="200" y="213" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#5a7a6a" opacity="0.5">Imagen temporal · reemplazar con foto real del consultorio</text>
</svg>
